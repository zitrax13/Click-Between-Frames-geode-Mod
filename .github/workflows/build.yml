name: Build Geode Mod

on:
  workflow_dispatch:
  push:
    branches:
      - "**"

jobs:
  build:
    name: Android64 Build
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      # 1. Устанавливаем официальный компилятор Android NDK
      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b

      # 2. ИСПРАВИЛИ: Качаем оригинальный архив через встроенную системную команду GitHub!
      - name: Install Geode CLI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download v3.1.1 --repo geode-sdk/cli --pattern "geode-cli-linux.zip"
          unzip geode-cli-linux.zip
          chmod +x geode
          sudo mv geode /usr/local/bin/

      # 3. Настраиваем Geode под версию игры 2.207
      - name: Configure Geode
        run: |
          geode profile add default
          geode sdk install v4.10.1

      # 4. Запускаем чистую сборку CMake
      - name: Build Mod
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake -DANDROID_ABI=arm64-v8a -DANDROID_PLATFORM=android-30
          make
