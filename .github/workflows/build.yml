name: Build Geode Mod (Android)

on:
  push:
    branches: [ main, master ]
    tags:
      - '*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - android32
          - android64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install Geode CLI
        run: cargo install geode-cli

      - name: Cache Geode SDK
        uses: actions/cache@v3
        with:
          path: ~/.geode
          key: ${{ runner.os }}-geode-${{ hashFiles('**/geode.cache') }}
          restore-keys: |
            ${{ runner.os }}-geode-

      - name: Build mod for ${{ matrix.platform }}
        run: geode build ${{ matrix.platform }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: geode-mod-${{ matrix.platform }}
          path: build/*.geode

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*.geode
          generate_release_notes: true
