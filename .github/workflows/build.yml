name: Build Geode Mod

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Android32
            target: Android32
          - name: Android64
            target: Android64

    name: ${{ matrix.config.name }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Этот шаг устанавливает Geode CLI и SDK
      # После него CMake на 6-й строке УВИДИТ GeodeConfig.cmake
      - name: Setup Geode
        uses: geode-sdk/setup-geode@main
        with:
          sdk: v3.0.0-beta.1

      - name: Build Geode Mod
        uses: geode-sdk/build-geode-mod@main
        with:
          target: ${{ matrix.config.target }}
          combine: true
