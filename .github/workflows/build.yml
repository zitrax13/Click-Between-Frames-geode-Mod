name: Build Geode Mod for Android

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build zip unzip wget curl jq

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
          add-to-path: false
        id: setup-ndk

      - name: Set Android NDK environment
        run: echo "ANDROID_NDK=${{ steps.setup-ndk.outputs.ndk-path }}" >> $GITHUB_ENV

      - name: Install Geode CLI
        run: |
          # Получаем URL последнего релиза для Linux (имя файла: geode-cli-linux)
          LATEST_URL=$(curl -s https://api.github.com/repos/geode-sdk/cli/releases/latest | jq -r '.assets[] | select(.name == "geode-cli-linux") | .browser_download_url')
          if [ -z "$LATEST_URL" ]; then
            echo "Could not find geode-cli-linux asset"
            exit 1
          fi
          wget -O geode-cli "$LATEST_URL"
          chmod +x geode-cli
          mkdir -p $HOME/.geode/bin
          mv geode-cli $HOME/.geode/bin/
          echo "$HOME/.geode/bin" >> $GITHUB_PATH

      - name: Verify Geode CLI
        run: geode --version

      - name: Cache Geode SDK
        uses: actions/cache@v4
        id: cache-geode-sdk
        with:
          path: ~/.geode
          key: ${{ runner.os }}-geode-sdk-android-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-geode-sdk-android-

      - name: Install Geode SDK for Android
        if: steps.cache-geode-sdk.outputs.cache-hit != 'true'
        run: |
          geode sdk install-linux
          geode sdk install-binaries -p android

      - name: Build mod for Android
        run: |
          # Сборка под Android arm64-v8a
          geode build --platform android --abi arm64-v8a --ninja

      - name: Upload .geode artifact
        uses: actions/upload-artifact@v4
        with:
          name: mod-android
          path: build/*.geode
