name: Build Geode Mod

on: [push, workflow_dispatch]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Android32
            target: Android32
          - name: Android64
            target: Android64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Geode CLI
        uses: geode-sdk/setup-geode@main

      - name: Force Install SDK
        run: |
          geode sdk install v3.0.0-beta.1
          echo "GEODE_SDK=$HOME/.geode/sdk" >> $GITHUB_ENV

      - name: Build Geode Mod
        uses: geode-sdk/build-geode-mod@main
        with:
          target: ${{ matrix.config.target }}
          combine: true
        env:
          Geode_DIR: ${{ env.GEODE_SDK }}
