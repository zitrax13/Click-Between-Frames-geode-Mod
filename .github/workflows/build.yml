name: Build Geode Mod (Android)

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch: # Позволяет запустить сборку кнопкой в браузере

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Android32
            target: Android32
          - name: Android64
            target: Android64

    name: ${{ matrix.config.name }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Geode Mod
        uses: geode-sdk/build-geode-mod@main
        with:
          target: ${{ matrix.config.target }}
          combine: true # Подготавливает файлы для объединения в один .geode

  package:
    name: Package and Release
    needs: build
    runs-on: ubuntu-latest
    if: success()
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Merge and Release
        uses: geode-sdk/build-geode-mod/combine@main
        id: build
        with:
          # Если вам нужен релиз, укажите токен (обычно создается сам)
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.build.outputs.build-output }}
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          draft: true # Создаст черновик, чтобы вы проверили перед публикацией
          generate_release_notes: true
