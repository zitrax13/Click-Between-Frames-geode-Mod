name: Android Build Manual

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    # 1. Устанавливаем Android NDK (версия 26b обычно нужна для Geode)
    - name: Setup Android NDK
      uses: nndixon/setup-ndk@v1
      with:
        ndk-version: r26b

    # 2. Устанавливаем Geode CLI (тот самый инструмент командной строки)
    - name: Setup Geode CLI
      uses: geode-sdk/setup-geode@v2

    # 3. Сама магия компиляции (Build Mod)
    # Здесь робот Гитхаба вызывает компилятор C++ для Android
    - name: Build Mod
      uses: geode-sdk/build-geode-mod@v2
      with:
        bindings-update: false
        # Собираем для 32-битных и 64-битных систем Android
        target: 'android32 android64'
        combine: true

    # 4. Сохраняем готовый файл .geode как Артефакт
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-cool-android-mod
        path: build-output/*.geode
