name: Build Geode Mod for Android

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build zip unzip wget curl

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
          add-to-path: false
        id: setup-ndk

      - name: Install Geode CLI
        run: |
          # Официальный скрипт установки Geode CLI
          curl -fsSL https://geode-sdk.org/install.sh | sh
          echo "$HOME/.geode/bin" >> $GITHUB_PATH

      - name: Cache Geode SDK
        uses: actions/cache@v4
        id: cache-geode-sdk
        with:
          path: ~/.geode
          key: ${{ runner.os }}-geode-sdk-android-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-geode-sdk-android-

      - name: Install Geode SDK for Android
        if: steps.cache-geode-sdk.outputs.cache-hit != 'true'
        run: |
          geode sdk install-linux
          geode sdk install-binaries -p android

      - name: Build mod for Android
        run: |
          # Собираем для Android arm64-v8a (можно изменить на armeabi-v7a)
          geode build --platform android --abi arm64-v8a --ninja

      - name: Upload .geode artifact
        uses: actions/upload-artifact@v4
        with:
          name: mod-android
          path: build/*.geode
