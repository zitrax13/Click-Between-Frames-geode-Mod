name: Build Geode Mod for Android

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build zip unzip wget curl jq clang

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
          add-to-path: false
        id: setup-ndk

      - name: Set environment variables
        run: |
          echo "ANDROID_NDK=${{ steps.setup-ndk.outputs.ndk-path }}" >> $GITHUB_ENV
          echo "GEODE_SDK=$HOME/.geode" >> $GITHUB_ENV
          echo "GEODE_NDK=${{ steps.setup-ndk.outputs.ndk-path }}" >> $GITHUB_ENV

      - name: Install Geode CLI
        id: install-geode
        run: |
          RELEASE_DATA=$(curl -s https://api.github.com/repos/geode-sdk/cli/releases/latest)
          ASSET_NAME=$(echo "$RELEASE_DATA" | jq -r '.assets[] | select(.name | test("linux")) | .name' | head -n1)
          if [ -z "$ASSET_NAME" ]; then
            echo "No Linux asset found."
            exit 1
          fi
          DOWNLOAD_URL=$(echo "$RELEASE_DATA" | jq -r ".assets[] | select(.name == \"$ASSET_NAME\") | .browser_download_url")
          wget -O geode-cli.zip "$DOWNLOAD_URL"
          unzip geode-cli.zip -d geode-cli-temp
          # В архиве может быть файл с именем geode или geode-cli
          if [ -f "geode-cli-temp/geode" ]; then
            mv geode-cli-temp/geode geode-cli
          elif [ -f "geode-cli-temp/geode-cli" ]; then
            mv geode-cli-temp/geode-cli geode-cli
          else
            find geode-cli-temp -type f -executable | head -n1 | xargs -I {} mv {} geode-cli
          fi
          chmod +x geode-cli
          mkdir -p $HOME/.geode/bin
          mv geode-cli $HOME/.geode/bin/
          echo "$HOME/.geode/bin" >> $GITHUB_PATH
          rm -rf geode-cli-temp geode-cli.zip

      - name: Cache Geode SDK
        uses: actions/cache@v4
        id: cache-geode-sdk
        with:
          path: ~/.geode
          key: ${{ runner.os }}-geode-sdk-android-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-geode-sdk-android-

      - name: Install Geode SDK for Android
        if: steps.cache-geode-sdk.outputs.cache-hit != 'true'
        run: |
          geode sdk install-linux
          # Для Android нужны бинарники Windows (для кросс-компиляции)
          geode sdk install-binaries -p android

      - name: Debug info
        run: |
          echo "=== Geode CLI version ==="
          geode --version
          echo "=== Geode SDK path ==="
          ls -la ~/.geode || true
          echo "=== Cross-tools path ==="
          ls -la ~/.local/share/Geode/cross-tools/ || true
          echo "=== Android NDK path ==="
          ls -la $ANDROID_NDK || true

      - name: Build mod for Android
        run: |
          geode build --platform android --abi arm64-v8a --ninja

      - name: Upload .geode artifact
        uses: actions/upload-artifact@v4
        with:
          name: mod-android
          path: build/*.geode
