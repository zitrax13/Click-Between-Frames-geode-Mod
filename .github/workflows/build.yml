name: Build Geode Mod (Android)

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Android32
            target: Android32
          - name: Android64
            target: Android64

    name: ${{ matrix.config.name }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Geode SDK
        uses: geode-sdk/setup-geode@v2
        with:
          # Указываем версию SDK явно (из твоего mod.json)
          sdk: v3.0.0-beta.1

      - name: Build Geode Mod
        uses: geode-sdk/build-geode-mod@v3
        with:
          target: ${{ matrix.config.target }}
          combine: true
