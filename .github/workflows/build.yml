name: Build Geode Mod

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Android
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup NDK
        uses: nndixon/setup-ndk@v1
        with:
          ndk-version: r26b

      - name: Setup Geode CLI
        uses: geode-sdk/setup-geode@main

      - name: Build Mod
        uses: geode-sdk/build-geode-mod@main
        with:
          bindings-update: false
          combine: true
          target: 'android32 android64'
