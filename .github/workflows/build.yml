name: Build Geode Mod for Android

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build zip unzip wget curl jq clang

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
          add-to-path: false
        id: setup-ndk

      - name: Set Android NDK environment
        run: echo "ANDROID_NDK=${{ steps.setup-ndk.outputs.ndk-path }}" >> $GITHUB_ENV

      - name: Install Geode CLI
        id: install-geode
        run: |
          RELEASE_DATA=$(curl -s https://api.github.com/repos/geode-sdk/cli/releases/latest)
          echo "Available assets:"
          echo "$RELEASE_DATA" | jq -r '.assets[].name'
          
          ASSET_NAME=$(echo "$RELEASE_DATA" | jq -r '.assets[] | select(.name | test("linux")) | .name' | head -n1)
          if [ -z "$ASSET_NAME" ]; then
            echo "No Linux asset found. Exiting."
            exit 1
          fi
          
          echo "Downloading $ASSET_NAME"
          DOWNLOAD_URL=$(echo "$RELEASE_DATA" | jq -r ".assets[] | select(.name == \"$ASSET_NAME\") | .browser_download_url")
          wget -O geode-cli.zip "$DOWNLOAD_URL"
          unzip geode-cli.zip -d geode-cli-temp
          echo "Contents of archive:"
          ls -la geode-cli-temp/
          
          # Ищем исполняемый файл
          if [ -f "geode-cli-temp/geode" ]; then
            mv geode-cli-temp/geode geode-cli
          elif [ -f "geode-cli-temp/geode-cli" ]; then
            mv geode-cli-temp/geode-cli geode-cli
          else
            CLI_FILE=$(find geode-cli-temp -type f | head -n1)
            if [ -n "$CLI_FILE" ]; then
              mv "$CLI_FILE" geode-cli
            else
              echo "Could not find any file in archive"
              exit 1
            fi
          fi
          
          chmod +x geode-cli
          mkdir -p $HOME/.geode/bin
          mv geode-cli $HOME/.geode/bin/
          
          # Сохраняем абсолютный путь к geode
          GEODE_PATH="$HOME/.geode/bin/geode-cli"
          echo "GEODE_PATH=$GEODE_PATH" >> $GITHUB_ENV
          echo "GEODE=$GEODE_PATH" >> $GITHUB_ENV
          
          # Проверяем, что файл существует и исполняемый
          if [ ! -x "$GEODE_PATH" ]; then
            echo "Geode CLI not found at $GEODE_PATH"
            exit 1
          fi
          
          rm -rf geode-cli-temp geode-cli.zip

      - name: Cache Geode SDK
        uses: actions/cache@v4
        id: cache-geode-sdk
        with:
          path: ~/.geode
          key: ${{ runner.os }}-geode-sdk-android-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-geode-sdk-android-

      - name: Install Geode SDK for Android
        if: steps.cache-geode-sdk.outputs.cache-hit != 'true'
        run: |
          $GEODE sdk install-linux
          $GEODE sdk install-binaries -p android

      - name: Build mod for Android
        run: |
          $GEODE build --platform android --abi arm64-v8a --ninja

      - name: Upload .geode artifact
        uses: actions/upload-artifact@v4
        with:
          name: mod-android
          path: build/*.geode
