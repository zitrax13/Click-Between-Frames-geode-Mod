name: Build Geode Mod

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Android32
            target: Android32
          - name: Android64
            target: Android64

    name: ${{ matrix.config.name }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Устанавливаем Geode CLI (инструмент управления)
      - name: Setup Geode CLI
        uses: geode-sdk/setup-geode@main

      # 2. Принудительно скачиваем SDK нужной версии
      - name: Install SDK
        run: geode sdk install v3.0.0-beta.1

      # 3. Теперь запускаем сборку — теперь CMake точно найдет GeodeConfig.cmake
      - name: Build Geode Mod
        uses: geode-sdk/build-geode-mod@main
        with:
          target: ${{ matrix.config.target }}
          combine: true
